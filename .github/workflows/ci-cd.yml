name: CI-CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: ca2-ci-cd-api

jobs:
  test-build-publish-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image for GHCR
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_REPO=ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_REPO:${{ github.sha }}
          docker tag $IMAGE_NAME:latest $IMAGE_REPO:latest

      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_REPO=ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME
          docker push $IMAGE_REPO:${{ github.sha }}
          docker push $IMAGE_REPO:latest

      - name: Deploy to cloud platform (Render deploy hook)
        if: github.event_name != 'pull_request' && env.RENDER_DEPLOY_HOOK_URL != ''
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
